name: Release

# Triggered by publishing a GitHub Release named like "v0.4.0" in THIS (source) repo.
# The workflow builds the packs, stamps module.json with the version + the PUBLIC
# distribution repo's URLs, zips the module, and publishes a matching Release with
# module.json + module.zip to the PUBLIC distribution repo (sledopyt-kasoda-dist).
#
# This lets the source repo stay PRIVATE while users install from the public dist repo:
#   https://github.com/<owner>/sledopyt-kasoda-dist/releases/latest/download/module.json
#
# Requires repo secret DIST_TOKEN: a fine-grained PAT with Contents: Read & Write
# scoped to the sledopyt-kasoda-dist repo (GITHUB_TOKEN cannot write to another repo).
on:
  release:
    types: [published]

env:
  # Public distribution repo (same owner). Users install from here.
  DIST_REPOSITORY: ${{ github.repository_owner }}/sledopyt-kasoda-dist

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Validate sources
        run: npm run validate

      - name: Stamp module.json (version + dist-repo URLs from the release tag)
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          # update-manifest.mjs prefers DIST_REPOSITORY (set above) for all public URLs.
        run: node tools/update-manifest.mjs

      - name: Compile compendium packs
        run: npm run pack

      - name: Create module.zip (files at archive root)
        run: zip -r module.zip module.json README.md LICENSE scripts packs -x '*/LOCK'

      - name: Publish release to the PUBLIC distribution repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.DIST_REPOSITORY }}
          token: ${{ secrets.DIST_TOKEN }}
          tag_name: ${{ github.event.release.tag_name }}
          name: ${{ github.event.release.tag_name }}
          body: ${{ github.event.release.body }}
          make_latest: true
          files: |
            module.json
            module.zip
