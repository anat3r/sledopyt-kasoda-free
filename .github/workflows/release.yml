name: Release

# Free (showcase) edition — SELF-CONTAINED repo.
# Triggered by publishing a GitHub Release named like "v0.1.0" in THIS repo.
# The workflow builds the packs, stamps module.json with the version + THIS repo's
# URLs, zips the module, and attaches module.json + module.zip to the SAME release.
#
# Users install from this repo directly:
#   https://github.com/<owner>/sledopyt-kasoda-free/releases/latest/download/module.json
#
# No cross-repo PAT is needed: GITHUB_TOKEN can write releases in its own repo.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Validate sources
        run: npm run validate

      - name: Stamp module.json (version + this repo's URLs from the release tag)
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          # DIST_REPOSITORY left unset on purpose: update-manifest.mjs falls back to
          # GITHUB_REPOSITORY, so all public URLs point at THIS (self-contained) repo.
        run: node tools/update-manifest.mjs

      - name: Compile compendium packs
        run: npm run pack

      - name: Create module.zip (files at archive root)
        run: zip -r module.zip module.json README.md LICENSE scripts packs assets -x '*/LOCK'

      - name: Attach module.json + module.zip to this release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            module.json
            module.zip
